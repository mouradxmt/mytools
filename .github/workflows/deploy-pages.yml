name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for the Pages deployment to authenticate.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Project pages serve under /<repo>/; user/org pages (<owner>.github.io) under /.
      - name: Resolve base path
        id: base
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          if [ "${repo,,}" = "${owner}.github.io" ]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      # Supabase config is baked in at build time (no server on Pages).
      # Both values are public-safe (URL + publishable/anon key). Add them as
      # repo Variables OR Secrets named SUPABASE_URL and SUPABASE_ANON_KEY.
      - name: Verify Supabase config is set
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing SUPABASE_URL / SUPABASE_ANON_KEY. Add them under Settings → Secrets and variables → Actions (Variables tab is fine; both are public-safe)."
            exit 1
          fi

      - name: Build
        env:
          VITE_BASE: ${{ steps.base.outputs.base }}
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      # SPA safety net: serve index.html for any unknown path.
      - name: Add 404 fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
