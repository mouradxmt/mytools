server {
  # __PORT__ is replaced at container start by 10-port.sh (Cloud Run sets $PORT=8080).
  listen __PORT__;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression — cuts egress on the JS/CSS bundle. Serve pre-built .gz when present.
  gzip on;
  gzip_static on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/manifest+json;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Never cache the runtime config or the HTML shell
  location = /env.js {
    add_header Cache-Control "no-store";
  }
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # Long cache for fingerprinted assets (repeat visits ≈ zero egress)
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}
